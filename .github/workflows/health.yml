name: actor-health

# Apify roz Actor ko uske DEFAULT input se chalata hai. Agar 5 min me non-empty
# dataset na mile aur ye 3 din lagatar ho -> "under maintenance" + store me demote.
# Ye workflow WAHI cheez karta hai, roz, Apify se PEHLE.
#
# Sirf EK job hai, jaan-boojh ke: deployed Actor ko khaali input se chalana.
#
# Pehle ek doosra job tha jo scraper ko seedha Eventbrite pe test karta tha.
# Wo hata diya -- Eventbrite GitHub ke datacenter IP ko 405 deta hai, to wo job
# HAMESHA red rehta. Hamesha-red alarm = ignore kiya hua alarm = asli fail bhi
# miss. (Apify ke IP se Eventbrite theek chalta hai, isliye Actor pe farq nahi.)
#
# Ye tareeka behtar bhi hai: ye asli deployed Actor ko wahin chalata hai jahan
# buyer chalata hai. Logic ke test har deploy pe chalte hain (deploy.yml).
on:
  schedule:
    - cron: "0 6 * * *"      # roz subah (UTC)
  workflow_dispatch:

jobs:
  deployed-actor:
    name: Apify pe Actor khaali input se chalta hai?
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run deployed Actor with EMPTY input (Apify ka roz ka test)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python check_actor.py
