name: deploy-actor

# Jab bhi Actor ka code badle aur main pe push ho -> khud Apify pe deploy.
# Manual `apify push` ki zarurat nahi.
on:
  push:
    branches: [main]
    paths:
      - "actors/eventbrite-events-scraper/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Test PEHLE. Ye Actor paying buyers ke saamne hai -- kharab commit
      # minute bhar me unke saamne chala jaata hai. Test fail = deploy nahi.
      #
      # --offline kyun: Eventbrite GitHub ke datacenter IP ko 405 deta hai, to
      # live test yahan se KABHI pass nahi hoga (Apify ke IP se theek chalta hai).
      # Use CI me rakhte to wo hamesha red rehta aur asli fail bhi ignore hone
      # lagta. Live jaanch check_actor.py karta hai -- wo deployed Actor ko Apify
      # ke apne server pe chalata hai, yaani jahan buyer chalata hai.
      - name: Test (deploy se pehle)
        working-directory: actors/eventbrite-events-scraper
        run: |
          pip install requests
          python test_eventbrite.py --offline

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install apify-cli
        run: npm install -g apify-cli

      # `apify login` ZAROORI hai -- `apify push` APIFY_TOKEN env var padhta hi
      # nahi (apify-cli 1.7 me push -> resolveToken() sirf keyring/auth.json
      # dekhta hai, aur push pe --token flag hai bhi nahi). Isliye "env: APIFY_TOKEN
      # + apify push" wala tareeka hamesha "not logged in" bolke fail hota tha.
      # CI me keyring nahi hota -- CLI khud ~/.apify/auth.json pe gir jaata hai.
      - name: Apify login
        run: apify login -t "${{ secrets.APIFY_TOKEN }}"

      # Apify ka apna push-actor-action@v1 bhi try kiya tha -- usme BUG hai:
      # build SUCCEED hota hai ("ACTOR: Build finished", tag lag jaata hai) par
      # action "build finished with status: null" bolke job fail kar deta hai.
      # (Build 0.0.7 usi tarah live chala gaya tha jabki job red thi.) Ek jhootha
      # red alarm baaki sab alarm bekaar kar deta hai, isliye seedha CLI.
      - name: Push to Apify
        working-directory: actors/eventbrite-events-scraper
        run: apify push --force
